name: 每日股票分析

on:
  # 定时触� � - 每天北京时间 18:00 (UTC 10:00)
  sc hedule:
    - cron: '0 10 * * *'     # 周� ��到周五，UTC 10:00 = 北京时间 18:00
   
  # 手动触发
  workflow_dispatch:
     inputs:
      mode:
        description: '运 行模式'
        required: true
        def ault: 'full'
        type: choice
        opt ions:
          - full          # 完整分� �（股票+大盘）
          - market-only    # 仅大盘复盘
          - stocks-only    # 仅股票分析
      force_run:
        d escription: '强制运行（跳过交易日� �查）'
        required: false
        defa ult: false
        type: boolean

# 并发控 制：同一时间只运行一个分析任务 
concurrency:
  group: stock-analysis
  cance l-in-progress: false

jobs:
  analyze:
    ru ns-on: ubuntu-latest
    # 添加超时限制 ，防止任务卡死
    timeout-minutes: ${ { fromJSON(vars.ANALYSIS_TIMEOUT_MINUTES || ' 30') }}
    
    steps:
      - name: 随机� ��迟（避免固定时间访问）
